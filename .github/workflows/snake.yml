name: Generate Snake 🐍

permissions:
  contents: write

on:
  schedule:
    - cron: "0 */12 * * *"
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Generate premium snake
        uses: Platane/snk@v3
        with:
          github_user_name: ABDULMUNAFZ
          outputs: |
            dist/snake.svg?color_snake=A78BFA&color_dots=#1a1b27,#302b63,#7c3aed,#a78bfa,#c4b5fd
            dist/snake-dark.svg?palette=github-dark&color_snake=A78BFA

      - name: Deploy snake
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
